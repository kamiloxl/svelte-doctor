name: "svelte-doctor-cli"
description: "Diagnose your Svelte 5 codebase. 0–100 health score."
branding:
  icon: "activity"
  color: "orange"

inputs:
  directory:
    description: "Project root to scan."
    required: false
    default: "."
  diff:
    description: "Base branch to diff against (e.g. main). When set, only changed files are scanned."
    required: false
  fail-on:
    description: "Fail the action when diagnostics of this severity or worse are found: error | warning | none."
    required: false
    default: "none"
  github-token:
    description: "GitHub token. When provided on pull_request events, diagnostics are posted (and updated) as a single PR comment."
    required: false
  project:
    description: "Workspace project(s) to scan (comma-separated)."
    required: false
  node-version:
    description: "Node.js version to use."
    required: false
    default: "22"

outputs:
  score:
    description: "Health score 0–100 (or empty when score could not be computed)."
    value: ${{ steps.score.outputs.score }}

runs:
  using: "composite"
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Run svelte-doctor-cli
      id: run
      shell: bash
      env:
        DIRECTORY: ${{ inputs.directory }}
        DIFF_BASE: ${{ inputs.diff }}
        FAIL_ON: ${{ inputs.fail-on }}
        PROJECT: ${{ inputs.project }}
      run: |
        set -e
        ARGS=("$DIRECTORY" "--annotations" "--fail-on" "$FAIL_ON" "--yes")
        if [ -n "$DIFF_BASE" ]; then
          ARGS+=("--diff" "$DIFF_BASE")
        fi
        if [ -n "$PROJECT" ]; then
          ARGS+=("--project" "$PROJECT")
        fi
        REPORT_PATH="${RUNNER_TEMP:-/tmp}/svelte-doctor-cli-report.json"
        npx -y svelte-doctor-cli@latest "${ARGS[@]}" || true
        JSON_ARGS=("$DIRECTORY" "--json" "--yes")
        if [ -n "$DIFF_BASE" ]; then
          JSON_ARGS+=("--diff" "$DIFF_BASE")
        fi
        if [ -n "$PROJECT" ]; then
          JSON_ARGS+=("--project" "$PROJECT")
        fi
        npx -y svelte-doctor-cli@latest "${JSON_ARGS[@]}" > "$REPORT_PATH"
        echo "report-path=$REPORT_PATH" >> "$GITHUB_OUTPUT"

    - name: Compute score
      id: score
      if: always()
      shell: bash
      env:
        DIRECTORY: ${{ inputs.directory }}
        PROJECT: ${{ inputs.project }}
      run: |
        # --score is an output-collection step, not a gate. Force --fail-on none
        # so the composite action doesn't fail under `set -e -o pipefail`.
        SCORE_ARGS=("$DIRECTORY" "--score" "--fail-on" "none" "--yes")
        if [ -n "$PROJECT" ]; then
          SCORE_ARGS+=("--project" "$PROJECT")
        fi
        SCORE=$(npx -y svelte-doctor-cli@latest "${SCORE_ARGS[@]}" 2>/dev/null | tail -1 | tr -d '[:space:]') || true
        if [[ -n "$SCORE" && "$SCORE" =~ ^[0-9]+$ ]]; then
          echo "score=$SCORE" >> "$GITHUB_OUTPUT"
        fi

    - name: Comment on PR
      if: ${{ inputs.github-token != '' && github.event_name == 'pull_request' }}
      uses: actions/github-script@v7
      env:
        REPORT_PATH: ${{ steps.run.outputs.report-path }}
        SVELTE_DOCTOR_SCORE: ${{ steps.score.outputs.score }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync(process.env.REPORT_PATH, 'utf8'));
          const score = process.env.SVELTE_DOCTOR_SCORE || report?.score?.score;
          const label = report?.score?.label;
          const total = report?.summary?.total ?? 0;
          const marker = '<!-- svelte-doctor-cli -->';
          const lines = [];
          lines.push(marker);
          lines.push('### svelte-doctor-cli');
          lines.push('');
          lines.push(`**Score:** ${score ?? 'n/a'} / 100${label ? ` — ${label}` : ''}`);
          lines.push(`**Issues:** ${total}`);
          if (total > 0) {
            lines.push('');
            lines.push('| File | Line | Severity | Rule | Message |');
            lines.push('| --- | ---: | --- | --- | --- |');
            for (const d of report.diagnostics.slice(0, 30)) {
              lines.push(`| \`${d.file}\` | ${d.line} | ${d.severity} | \`${d.ruleId}\` | ${d.message.replace(/\|/g, '\\|')} |`);
            }
            if (report.diagnostics.length > 30) {
              lines.push('');
              lines.push(`…and ${report.diagnostics.length - 30} more.`);
            }
          }
          const body = lines.join('\n');

          const { data: comments } = await github.rest.issues.listComments({
            ...context.repo,
            issue_number: context.issue.number,
          });
          const previous = comments.find((c) => c.body?.startsWith(marker));
          if (previous) {
            await github.rest.issues.updateComment({
              ...context.repo,
              comment_id: previous.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body,
            });
          }
